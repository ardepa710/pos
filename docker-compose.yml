name: pos

services:
  db:
    image: postgres:16-alpine
    container_name: pos-db
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pos_user", "-d", "pos_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - pos-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos-backend
    # host.docker.internal resolves automatically on Windows/macOS (Docker Desktop).
    # On Linux / Raspberry Pi, Docker does not inject it — this extra_hosts entry
    # maps it to the host gateway so Print Bridge is reachable on all platforms.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://pos_user:${DB_PASSWORD}@pos-db:5432/pos_db
      DATABASE_SYNC_URL: postgresql://pos_user:${DB_PASSWORD}@pos-db:5432/pos_db
      SECRET_KEY: ${JWT_SECRET}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      BANXICO_API_KEY: ${BANXICO_API_KEY:-}
      LICENSE_MODE: ${LICENSE_MODE:-none}
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
      DEMO_MODE: ${DEMO_MODE:-false}
      BUSINESS_NAME: ${BUSINESS_NAME:-Mi Negocio}
      BUSINESS_TYPE: ${BUSINESS_TYPE:-general}
      BACKUP_PATH: /backups
      SUPPORT_WHATSAPP: ${SUPPORT_WHATSAPP:-}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      PRINT_BRIDGE_URL: ${PRINT_BRIDGE_URL:-http://host.docker.internal:9100}
      PRINT_BRIDGE_ENABLED: ${PRINT_BRIDGE_ENABLED:-false}
      TZ: America/Mexico_City
      ENV: production
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - backups:/backups
    restart: unless-stopped
    networks:
      - pos-internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: pos-frontend
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - pos-internal

  proxy:
    image: caddy:2-alpine
    container_name: pos-proxy
    ports:
      - "3005:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - pos-internal

volumes:
  pgdata:
  backups:
  caddydata:
  caddyconfig:

networks:
  pos-internal:
    driver: bridge
