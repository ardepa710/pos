name: pos

# ─────────────────────────────────────────────────────────────────────────────
# POS — Production compose file
#
# Zero-dependency setup on any machine with Docker:
#
#   curl -O https://raw.githubusercontent.com/ardepa710/pos/main/docker-compose.prod.yml
#   curl -O https://raw.githubusercontent.com/ardepa710/pos/main/.env.example
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.prod.yml up -d
#
# Images are pulled from ghcr.io — no git clone, no build step required.
# The Caddyfile is embedded below (configs:) — no external files needed.
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: pos-db
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pos_user", "-d", "pos_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - pos-internal

  backend:
    image: ghcr.io/ardepa710/pos-backend:${TAG:-latest}
    container_name: pos-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # DB connection is built from components in app/config.py using
      # urllib.parse.quote — safe with any password (including @, $, !, etc.)
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: pos-db
      SECRET_KEY: ${JWT_SECRET}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      BANXICO_API_KEY: ${BANXICO_API_KEY:-}
      LICENSE_MODE: ${LICENSE_MODE:-none}
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
      DEMO_MODE: ${DEMO_MODE:-false}
      BUSINESS_NAME: ${BUSINESS_NAME:-Mi Negocio}
      BUSINESS_TYPE: ${BUSINESS_TYPE:-general}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3005","http://localhost"]}'
      BACKUP_PATH: /backups
      SUPPORT_WHATSAPP: ${SUPPORT_WHATSAPP:-}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      PRINT_BRIDGE_URL: ${PRINT_BRIDGE_URL:-http://host.docker.internal:9100}
      PRINT_BRIDGE_ENABLED: ${PRINT_BRIDGE_ENABLED:-false}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      TZ: America/Mexico_City
      ENV: production
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - backups:/backups
    restart: unless-stopped
    networks:
      - pos-internal

  frontend:
    image: ghcr.io/ardepa710/pos-frontend:${TAG:-latest}
    container_name: pos-frontend
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - pos-internal

  proxy:
    image: caddy:2-alpine
    container_name: pos-proxy
    ports:
      - "${PORT:-3005}:80"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - pos-internal

# ── Inline Caddyfile — no external file needed ────────────────────────────────
configs:
  caddyfile:
    content: |
      :80 {
          handle /api/* {
              reverse_proxy backend:8000
          }
          handle /health {
              reverse_proxy backend:8000
          }
          handle {
              reverse_proxy frontend:3000
          }
          header {
              X-Frame-Options DENY
              X-Content-Type-Options nosniff
              Referrer-Policy strict-origin-when-cross-origin
              X-XSS-Protection "1; mode=block"
              Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
              -Server
          }
          encode gzip
          log {
              output stdout
              format json
              level INFO
          }
      }

volumes:
  pgdata:
  backups:
  caddydata:
  caddyconfig:

networks:
  pos-internal:
    driver: bridge
